<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog</title>
  <meta name="description" content="Welcome to the Blog page." />
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #1f2937;
    }
    .card {
      text-align: center;
      padding: 2rem;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 560px;
      width: calc(100% - 2rem);
    }
    h1 { margin: 0 0 0.75rem; font-size: 2rem; }
    p { margin: 0; line-height: 1.6; color: #4b5563; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Blog</h1>
    <p>Welcome to the Blog landing page. New posts will be published here soon.</p>
  </main>
</body>
</html>
